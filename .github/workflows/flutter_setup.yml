name: Setup NoorApp Flutter WebView (Ultra Clean)

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 2. Setup Flutter (Fixed Version)
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable
          cache: true

      # 3. Disable Analytics (no popup)
      - name: Disable Flutter Analytics
        run: flutter config --no-analytics

      # 4. Clean Old Files (important 🔥)
      - name: Clean Project Folder
        run: |
          rm -rf android ios lib test web linux macos windows pubspec.* .metadata

      # 5. Create Fresh Flutter Project (SAFE NAME)
      - name: Create Flutter Project
        run: |
          flutter create . --project-name noorapp --org com.noorapp.app

      # 6. Add Dependency
      - name: Install WebView
        run: flutter pub add webview_flutter

      # 7. Replace Main.dart
      - name: Setup WebView Code
        run: |
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() {
            runApp(const NoorApp());
          }

          class NoorApp extends StatelessWidget {
            const NoorApp({super.key});

            @override
            Widget build(BuildContext context) {
              return const MaterialApp(
                debugShowCheckedModeBanner: false,
                home: WebViewScreen(),
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});

            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController controller;

            @override
            void initState() {
              super.initState();

              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..loadRequest(
                  Uri.parse("https://lavenderblush-eagle-882875.hostingersite.com/chat_group.php"),
                );
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(
                  child: WebViewWidget(controller: controller),
                ),
              );
            }
          }
          EOF

      # 8. Add Permissions (SAFE INSERT)
      - name: Add Android Permissions
        run: |
          sed -i '/<manifest/a\
          <uses-permission android:name="android.permission.INTERNET"/>\
          <uses-permission android:name="android.permission.CAMERA"/>\
          <uses-permission android:name="android.permission.RECORD_AUDIO"/>\
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\
          <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>' \
          android/app/src/main/AndroidManifest.xml

      # 9. Get Packages
      - name: Flutter Pub Get
        run: flutter pub get

      # 10. Commit
      - name: Commit & Push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add .
          git commit -m "Ultra clean NoorApp setup" || echo "Nothing to commit"
          git push
