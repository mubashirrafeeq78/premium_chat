name: NoorApp Build APK

on:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout Repo
    uses: actions/checkout@v4

  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: 3.19.0

  - name: Create Project
    run: flutter create noor_app

  - name: Add Dependencies
    run: |
      echo "  webview_flutter: ^4.4.2" >> noor_app/pubspec.yaml
      echo "  permission_handler: ^11.3.0" >> noor_app/pubspec.yaml

  - name: Replace Main.dart
    run: |
      cat > noor_app/lib/main.dart << 'EOF'
      import 'package:flutter/material.dart';
      import 'package:webview_flutter/webview_flutter.dart';
      import 'package:permission_handler/permission_handler.dart';

      void main() {
        runApp(const NoorApp());
      }

      class NoorApp extends StatelessWidget {
        const NoorApp({super.key});

        @override
        Widget build(BuildContext context) {
          return MaterialApp(
            debugShowCheckedModeBanner: false,
            home: const WebPage(),
          );
        }
      }

      class WebPage extends StatefulWidget {
        const WebPage({super.key});

        @override
        State<WebPage> createState() => _WebPageState();
      }

      class _WebPageState extends State<WebPage> {
        late final WebViewController controller;

        @override
        void initState() {
          super.initState();
          requestPermissions();

          controller = WebViewController()
            ..setJavaScriptMode(JavaScriptMode.unrestricted)
            ..loadRequest(Uri.parse(
              "https://lavenderblush-eagle-882875.hostingersite.com/chat_group.php"
            ));
        }

        Future<void> requestPermissions() async {
          await [
            Permission.microphone,
            Permission.camera,
            Permission.storage
          ].request();
        }

        @override
        Widget build(BuildContext context) {
          return Scaffold(
            body: SafeArea(
              child: WebViewWidget(controller: controller),
            ),
          );
        }
      }
      EOF

  - name: Add Android Permissions
    run: |
      sed -i '/<manifest/a\
          <uses-permission android:name="android.permission.INTERNET"/>\
          <uses-permission android:name="android.permission.RECORD_AUDIO"/>\
          <uses-permission android:name="android.permission.CAMERA"/>\
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\
          <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>' noor_app/android/app/src/main/AndroidManifest.xml

  - name: Build APK
    run: |
      cd noor_app
      flutter pub get
      flutter build apk --release

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: NoorApp
      path: noor_app/build/app/outputs/flutter-apk/app-release.apk
