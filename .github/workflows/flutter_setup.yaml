name: Setup Flutter Project

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"   # stable fixed version (no error)

      - name: Create Flutter Project
        run: |
          flutter create . --overwrite --org com.masail.hal --project-name premium_chat

      - name: Commit & Push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add .
          git commit -m "Flutter project auto-created" || echo "No changes to commit"
          git push
