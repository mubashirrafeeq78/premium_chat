name: premium_chat
description: "A professional consultation chat application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # انٹرنیٹ اور بیک اینڈ API کے لیے
  http: ^1.2.1
  
  # تصاویر اور کیمرہ کے لیے (Auto-send logic کے لیے)
  image_picker: ^1.1.0
  
  # ویڈیو پلے کرنے کے لیے (تاکہ برانڈڈ ایپ کی طرح ویڈیو چلے)
  video_player: ^2.8.6
  
  # لوکل اسٹوریج (Settings اور UserID کے لیے)
  shared_preferences: ^2.2.3

  # تاریخ اور وقت کے لیے
  intl: ^0.19.0

  # اصلی وائس ریکارڈنگ کے لیے (Long Press functionality)
  record: ^5.1.0
  
  # آواز پلے کرنے کے لیے (Professional UI)
  audioplayers: ^5.2.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # اگر آپ نے مستقبل میں کوئی اپنی تصاویر یا فانٹ لگانے ہوں تو یہاں ایڈ ہوں گے
