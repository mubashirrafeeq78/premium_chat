name: premium_chat
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # انٹرنیٹ اور بیک اینڈ سے بات کرنے کے لیے
  http: ^1.2.1
  
  # تصاویر اور ویڈیوز منتخب کرنے کے لیے (میڈیا سینڈنگ کے لیے لازمی)
  image_picker: ^1.1.0
  
  # ڈیٹا لوکل اسٹوریج میں محفوظ کرنے کے لیے (User ID اور Cache کے لیے)
  shared_preferences: ^2.2.3

  # تاریخ اور وقت کی فارمیٹنگ کے لیے
  intl: ^0.19.0

  # وائس ریکارڈنگ کے لیے (Chat Group ڈیزائن کے لیے ضروری)
  record: ^5.1.0
  
  # ریکارڈ شدہ آواز پلے کرنے کے لیے
  audioplayers: ^5.2.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
