name: NoorApp
description: "A premium webview application."
publish_to: 'none'

version: 1.0.0+1

environment:
  # یہاں ہم نے ورژن 3.5.0 کر دیا ہے تاکہ لیٹسٹ لائبریریز سپورٹ ہوں
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  # یہ لیٹسٹ ورژنز ہیں جو کیمرہ اور مائیکروفون کے لیے بہترین ہیں
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.0.0
  webview_flutter_wkwebview: ^3.15.0
  
  # پرمیشن ہینڈلر
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
